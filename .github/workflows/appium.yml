name: Appium Mobile Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  appium-android:
    name: 📱 Appium Android Tests
    # ubuntu-latest supports KVM hardware acceleration for Android emulator
    runs-on: ubuntu-latest

    steps:
    # ── 1. Checkout ──────────────────────────────────────────────────────────
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ── 2. Enable KVM hardware acceleration (required for Android emulator) ──
    - name: Enable KVM Hardware Acceleration
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
        sudo apt-get install -y cpu-checker
        kvm-ok || echo "KVM not available — emulator will use software rendering"

    # ── 3. Java (required by Android SDK / emulator) ─────────────────────────
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    # ── 4. Node.js ───────────────────────────────────────────────────────────
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: firstresponder/package-lock.json

    # ── 5. Install Appium + UiAutomator2 driver ───────────────────────────
    - name: Install Appium and UiAutomator2 Driver
      run: |
        npm install -g appium@latest
        appium driver install uiautomator2
        appium driver list --installed

    # ── 6. Install project deps ───────────────────────────────────────────
    - name: Install Project Dependencies
      run: |
        cd firstresponder
        npm install --loglevel=error --no-audit --no-fund
        cd client && npm install --loglevel=error --no-audit --no-fund
        cd ../functions && npm install --loglevel=error --no-audit --no-fund

    # ── 7. Build the Vite client ──────────────────────────────────────────
    - name: Build Client for Testing
      env:
        VITE_FIREBASE_API_KEY: ci-demo-key
        VITE_FIREBASE_AUTH_DOMAIN: ci-demo.firebaseapp.com
        VITE_FIREBASE_PROJECT_ID: ci-demo-project
        VITE_FIREBASE_STORAGE_BUCKET: ci-demo-project.appspot.com
        VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
        VITE_FIREBASE_APP_ID: "1:000000000000:web:ci-demo"
        VITE_MEASUREMENT_ID: G-CIDEMO1234
        VITE_FIREBASE_DATABASE_URL: https://ci-demo-project.firebaseio.com
      run: |
        cd firstresponder/client
        npm run build

    # ── 8. Start Vite preview server ─────────────────────────────────────
    - name: Start Vite Preview Server
      run: |
        cd firstresponder/client
        npx vite preview --port 5173 --host 0.0.0.0 &
        echo "SERVER_PID=$!" >> $GITHUB_ENV
        echo "⏳ Waiting for preview server..."
        for i in $(seq 1 30); do
          if curl -sf http://127.0.0.1:5173 > /dev/null 2>&1; then
            echo "✅ Preview server is ready on :5173"
            break
          fi
          echo "  Attempt $i/30 — retrying in 2s..."
          sleep 2
        done

    # ── 9. Start Appium server ────────────────────────────────────────────
    - name: Start Appium Server
      run: |
        appium --log appium.log --log-level info &
        echo "APPIUM_PID=$!" >> $GITHUB_ENV
        echo "⏳ Waiting for Appium server on :4723..."
        for i in $(seq 1 20); do
          if curl -sf http://127.0.0.1:4723/status > /dev/null 2>&1; then
            echo "✅ Appium server is ready!"
            break
          fi
          sleep 2
        done
        curl -s http://127.0.0.1:4723/status | python3 -m json.tool || true

    # ── 10. Run Appium tests inside Android Emulator ──────────────────────
    - name: Run Appium Tests in Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 31
        target: google_apis
        arch: x86_64
        profile: pixel_5
        ram-size: 4096M
        heap-size: 512M
        disable-animations: true
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        script: |
          echo "✅ Android Emulator is running"

          # Wait for the emulator to be fully booted
          echo "⏳ Waiting for emulator to be fully booted..."
          adb wait-for-device
          boot_completed=""
          for i in $(seq 1 60); do
            boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            if [ "$boot_completed" = "1" ]; then
              echo "✅ Emulator boot complete!"
              break
            fi
            echo "  Boot attempt $i/60..."
            sleep 3
          done

          if [ "$boot_completed" != "1" ]; then
            echo "❌ Emulator failed to boot in time"
            exit 1
          fi

          # Check Chrome/WebView is available
          echo "--- Installed packages (chrome-related) ---"
          adb shell pm list packages | grep -i "chrome\|webview\|browser" || echo "No Chrome found — will use WebView"

          # Run the Appium test suite
          cd firstresponder
          echo "### 📱 Appium Android Test Results" >> $GITHUB_STEP_SUMMARY

          node --test \
            --test-reporter=./test/pytest-reporter.js \
            test/appium.*.test.js 2>&1 | tee appium-report.txt
          TEST_EXIT=${PIPESTATUS[0]}

          if [ -f test-summary.md ]; then cat test-summary.md >> $GITHUB_STEP_SUMMARY; fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Emulator:** Android API 31 (Google APIs) · x86_64 · Pixel 5" >> $GITHUB_STEP_SUMMARY

          exit $TEST_EXIT

    # ── 11. Upload Appium log and test report ─────────────────────────────
    - name: Upload Appium Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: appium-android-report
        path: |
          firstresponder/appium-report.txt
          appium.log
        retention-days: 7
