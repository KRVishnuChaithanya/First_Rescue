name: Appium Mobile Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  appium-android:
    name: 📱 Appium Android Tests
    runs-on: ubuntu-latest

    steps:
    # ── 1. Checkout ────────────────────────────────────────────────────────
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ── 2. KVM hardware acceleration ───────────────────────────────────────
    - name: Enable KVM Hardware Acceleration
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    # ── 3. Java (required by Android SDK) ─────────────────────────────────
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    # ── 4. Node.js ─────────────────────────────────────────────────────────
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: firstresponder/package-lock.json

    # ── 5. Appium + UiAutomator2 ───────────────────────────────────────────
    - name: Install Appium and UiAutomator2 Driver
      run: |
        npm install -g appium@latest
        appium driver install uiautomator2
        appium driver list --installed

    # ── 6. Project dependencies ────────────────────────────────────────────
    - name: Install Project Dependencies
      run: |
        cd firstresponder
        npm install --loglevel=error --no-audit --no-fund
        cd client && npm install --loglevel=error --no-audit --no-fund
        cd ../functions && npm install --loglevel=error --no-audit --no-fund

    # ── 7. Build Vite client ───────────────────────────────────────────────
    - name: Build Client for Testing
      env:
        VITE_FIREBASE_API_KEY: ci-demo-key
        VITE_FIREBASE_AUTH_DOMAIN: ci-demo.firebaseapp.com
        VITE_FIREBASE_PROJECT_ID: ci-demo-project
        VITE_FIREBASE_STORAGE_BUCKET: ci-demo-project.appspot.com
        VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
        VITE_FIREBASE_APP_ID: "1:000000000000:web:ci-demo"
        VITE_MEASUREMENT_ID: G-CIDEMO1234
        VITE_FIREBASE_DATABASE_URL: https://ci-demo-project.firebaseio.com
      run: |
        cd firstresponder/client
        npm run build

    # ── 8. Start Vite preview server ───────────────────────────────────────
    - name: Start Vite Preview Server
      run: |
        cd firstresponder/client
        npx vite preview --port 5173 --host 0.0.0.0 &
        echo "⏳ Waiting for preview server on :5173..."
        for i in $(seq 1 30); do
          if curl -sf http://127.0.0.1:5173 > /dev/null 2>&1; then
            echo "✅ Preview server ready!"
            break
          fi
          sleep 2
        done

    # ── 9. Start Appium server ─────────────────────────────────────────────
    - name: Start Appium Server
      run: |
        appium --log appium.log --log-level info &
        echo "⏳ Waiting for Appium on :4723..."
        for i in $(seq 1 20); do
          if curl -sf http://127.0.0.1:4723/status > /dev/null 2>&1; then
            echo "✅ Appium ready!"
            break
          fi
          sleep 2
        done
        curl -s http://127.0.0.1:4723/status | python3 -m json.tool || true

    # ── 10. Make runner script executable ─────────────────────────────────
    - name: Make emulator runner script executable
      run: chmod +x firstresponder/test/run-appium-android.sh

    # ── 11. Run Appium tests in Android Emulator ───────────────────────────
    #
    #   IMPORTANT: The `script:` value here is a SINGLE bash command.
    #   All complex logic (loops, conditionals, PIPESTATUS) lives inside
    #   run-appium-android.sh to avoid /bin/sh YAML multiline parse errors.
    #
    - name: Run Appium Tests in Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 31
        target: google_apis
        arch: x86_64
        profile: pixel_5
        ram-size: 4096M
        heap-size: 512M
        disable-animations: true
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        script: bash firstresponder/test/run-appium-android.sh

    # ── 12. Upload reports ─────────────────────────────────────────────────
    - name: Upload Appium Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: appium-android-report
        path: |
          firstresponder/appium-report.txt
          appium.log
        retention-days: 7
