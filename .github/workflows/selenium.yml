name: Selenium E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  selenium-e2e:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: firstresponder/package-lock.json

    - name: Install Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Display Chrome Version
      run: google-chrome --version

    - name: Install Dependencies (Root, Client, and Functions)
      run: |
        cd firstresponder
        npm install
        cd client && npm install
        cd ../functions && npm install

    - name: Build Client for Testing
      # Provide dummy Firebase config so vite build succeeds in CI.
      # The Selenium tests only check that pages render HTML — they do not
      # make real Firebase calls, so dummy values are safe here.
      env:
        VITE_FIREBASE_API_KEY: ci-demo-key
        VITE_FIREBASE_AUTH_DOMAIN: ci-demo.firebaseapp.com
        VITE_FIREBASE_PROJECT_ID: ci-demo-project
        VITE_FIREBASE_STORAGE_BUCKET: ci-demo-project.appspot.com
        VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
        VITE_FIREBASE_APP_ID: "1:000000000000:web:ci-demo"
        VITE_MEASUREMENT_ID: G-CIDEMO1234
        VITE_FIREBASE_DATABASE_URL: https://ci-demo-project.firebaseio.com
      run: |
        cd firstresponder/client
        npm run build

    - name: Start Preview Server & Run Selenium Tests
      run: |
        cd firstresponder/client
        npx vite preview --port 5173 &
        SERVER_PID=$!

        # Wait for the preview server to be ready (up to 60 seconds)
        echo "⏳ Waiting for preview server to start..."
        for i in $(seq 1 30); do
          if curl -s http://localhost:5173 > /dev/null 2>&1; then
            echo "✅ Server is ready!"
            break
          fi
          echo "  Attempt $i/30..."
          sleep 2
        done

        # Run Selenium E2E tests from the firstresponder root.
        # NOTE: test/*.e2e.test.js — single * avoids needing 'shopt -s globstar'
        # and correctly matches all .e2e.test.js files directly inside test/.
        # NOTE: --test-concurrency=1 is CRITICAL — without it Node.js 22 runs
        # all 4 test files in parallel, launching 4 Chrome instances at once on
        # a 2-core CI machine, causing random crashes and 1 test to fail.
        cd ..
        echo "### 🧪 Selenium E2E Test Results" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
        node --test --test-concurrency=1 --test-reporter=./test/pytest-reporter.js test/*.e2e.test.js 2>&1 | tee selenium-report.txt
        TEST_EXIT=${PIPESTATUS[0]}
        cat selenium-report.txt >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

        # Stop the preview server
        kill $SERVER_PID 2>/dev/null || true
        exit $TEST_EXIT

    - name: Upload Selenium Test Report
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: selenium-e2e-report
        path: firstresponder/selenium-report.txt
